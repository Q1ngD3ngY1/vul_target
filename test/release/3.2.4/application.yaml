robot_default:
  # robot_default 中只修改了以下几个 filter，其他配置保持不变
  filters:
    search_release:
      top_n: 15
      filter:
        - doc_type: 1
          confidence: 0.7
          top_n: 3
        - doc_type: 4
          confidence: 0.8
          top_n: 5
        - doc_type: 2
          confidence: 0.2
          top_n: 5
        - doc_type: 5
          confidence: 0
          top_n: 0
        - doc_type: 8
          confidence: 0
          top_n: 0
    search_release_question:
      top_n: 1
      skip_rechunk: true
      filter:
        - doc_type: 1
          confidence: 0.97
          top_n: 1
    search_preview:
      top_n: 15
      filter:
        - doc_type: 1
          index_id: 2
          confidence: 0.7
          top_n: 3
        - doc_type: 4
          index_id: 7
          confidence: 0.8
          top_n: 5
        - doc_type: 2
          index_id: 4
          confidence: 0.2
          top_n: 5
        - doc_type: 5
          index_id: 0
          confidence: 0
          top_n: 0
        - doc_type: 8
          index_id: 0
          confidence: 0
          top_n: 0
    search_preview_question:
      top_n: 1
      skip_rechunk: true
      filter:
        - doc_type: 1
          index_id: 2
          confidence: 0.97
          top_n: 1

