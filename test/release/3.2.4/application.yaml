db_source:
  # 以下是新增配置
  db_source_decode_key: 
  proxy: 11.145.119.124:1080
  proxy_user: proxyuser
  proxy_pd: PhZFaEdf1qHy0
  proxy_effect_time: "2025-11-18 21:00:00"
  # 不安全的DSN参数列表，用于安全检查
  unsafe_dsn_params:
    # MySQL 不安全参数
    - "allowAllFiles"           # 允许读取服务器上的任意文件，存在严重安全风险
    - "allowLoadLocalInfile"    # 允许LOAD DATA LOCAL INFILE，可能导致本地文件泄露

# database 是新增配置项
database:
  forbidden_database_names:
    sql_server: ["master", "model", "tempdb", "msdb", "Resource", "Monitor"]

# release_param_config 是新增配置项
# 知识库发布任务的参数配置
release_param_config:
  # 获取发布中的记录的数量
  get_releasing_record_size: 2500
  # 发布时批量处理数据的批次数量
  batch_process_concurrency: 10
  # 发布时批量写入发布记录的并发数量,待废弃
  release_record_concurrency: 10
  # 发布时批量更新发布记录的批次大小
  release_record_batch_size: 500
  # 发布时批量写入发布记录的并发数量
  create_release_concurrency: 10
  # 发布时批量写入发布记录的批次大小
  create_release_batch_size: 150
  # 获取id的批量大小 默认500 即一次获取500个id，然后再批量查询
  get_ids_chunk_size: 500
  # 发布时批量同步增加向量数据数量
  batch_add_nodes_size: 100
  # 发布时批量同步删除向量数据数量
  batch_delete_nodes_size: 100
  # 向量发布回调写库的并发数量
  notify_batch_size: 3
  # 向量发布重试次数
  retry_times: 2
# qa审核开关，默认不配置
qa_audit_switch: false
# 节点批量创建每批次大小
insert_nodes_chunk: 100
# 节点批量获取每批次大小
get_nodes_chunk: 200
# 获取id的批量大小 默认5w 即一次获取5w个id
get_ids_chunk_size: 50000
# 批量删除数据的数量，默认100
delete_chunk_size: 100
# 发布任务的参数配置
publish_param_config:
  # 发布时批量同步节点数据数量
  batch_add_nodes_size: 100
  # embedding调用的并发数
  embedding_batch_size: 20
  # 发布时图片embedding调用的并发数
  image_embedding_batch_size: 10
  # 批量添加向量的数量
  batch_add_vector_size: 100
  # 发布时写入redis kv单key节点数量
  kv_node_batch_size: 100
  # 回调admin的并发数量
  notify_batch_size: 3
  # 添加向量/ES等失败的调用次数（重试1次）
  retry_times: 2
  delete_batch_size: 100
